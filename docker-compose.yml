services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scorebot
      POSTGRES_PASSWORD: scorebot
      POSTGRES_DB: scorebot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorebot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  flyway:
    image: flyway/flyway:11
    depends_on:
      db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./migrations:/flyway/sql:ro,z
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/scorebot
      FLYWAY_USER: scorebot
      FLYWAY_PASSWORD: scorebot

  openserp:
    image: karust/openserp
    restart: unless-stopped
    command: serve -a 0.0.0.0 -p 7000
    ports:
      - "127.0.0.1:7000:7000"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
      openserp:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scorebot:scorebot@db:5432/scorebot
      OPENSERP_URL: http://openserp:7000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./configs:/app/configs:ro,z

  db-backup:
      image: prodrigestivill/postgres-backup-local
      restart: unless-stopped
      depends_on:
        db:
          condition: service_healthy
      environment:
        POSTGRES_HOST: db
        POSTGRES_DB: scorebot
        POSTGRES_USER: scorebot
        POSTGRES_PASSWORD: scorebot
        SCHEDULE: "@hourly"          # cron или @hourly/@daily/@weekly
        BACKUP_KEEP_DAYS: 7
        BACKUP_KEEP_WEEKS: 4
        BACKUP_KEEP_MONTHS: 6
        HEALTHCHECK_PORT: 8080
      volumes:
        - ./backups:/backups

volumes:
  pgdata:
  redisdata:
