services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scorebot
      POSTGRES_PASSWORD: scorebot
      POSTGRES_DB: scorebot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorebot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  flyway:
    image: flyway/flyway:11
    depends_on:
      db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./migrations:/flyway/sql:ro,z
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/scorebot
      FLYWAY_USER: scorebot
      FLYWAY_PASSWORD: scorebot

  openserp:
    image: karust/openserp
    restart: unless-stopped
    command: serve -a 0.0.0.0 -p 7000
    ports:
      - "127.0.0.1:7000:7000"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
      openserp:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scorebot:scorebot@db:5432/scorebot
      OPENSERP_URL: http://openserp:7000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./configs:/app/configs:ro,z
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: scorebot
      POSTGRES_USER: scorebot
      POSTGRES_PASSWORD: scorebot
      SCHEDULE: "@hourly"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - /var/backups/scorebot:/backups

  # ── Мониторинг ────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - lokidata:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - ./monitoring/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    environment:
      # ⚠️ Смени пароль перед деплоем
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Отключаем телеметрию
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  redisdata:
  lokidata:
  grafanadata: