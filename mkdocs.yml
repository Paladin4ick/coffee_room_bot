site_name: Coffee Room Bot
site_url: https://cu63.github.io/coffee_room_bot
repo_url: https://github.com/Cu63/coffee_room_bot
repo_name: Cu63/coffee_room_bot
edit_uri: edit/master/docs/

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: ru
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Установка и запуск: setup.md
  - Конфигурация: configuration.md
  - Команды бота: commands.md
  - Архитектура: architecture.md
  - Игры:
    - Блекджек: games/blackjack.md
    - Слоты: games/slots.md
    - Кости: games/dice.md
    - Гивэвей: games/giveaway.md
  - Разработка: development.md
  - Бэклог: backlog.md
